on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

name: Test Live Mode

jobs:
  test-falco-live:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
    - name: Start Falco
      uses: falcosecurity/falco-actions/start@54d299d4c40de1ad6bf680fefbbfed1bc5b8f057
      with:
        mode: live
        falco-version: '0.39.0'
        verbose: true
        
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    
    - name: Read Sensitive File
      run: |
        sleep 3
        docker run --rm --privileged ubuntu cat /etc/shadow
        sleep 3

    - name: Id
      run: |
        id
        groups

    - name: Stop Falco
      uses: falcosecurity/falco-actions/stop@54d299d4c40de1ad6bf680fefbbfed1bc5b8f057
      with:
        mode: live
        verbose: true
  
  test-falco-live-custom-rule:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
    - name: Start Falco
      uses: falcosecurity/falco-actions/start@54d299d4c40de1ad6bf680fefbbfed1bc5b8f057
      with:
        mode: live
        falco-version: '0.39.0'
        custom-rule-file: '${{ github.workspace }}/rules/falco_cicd_rules.yaml'
        verbose: true

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Overwrite Source Code
      shell: bash
      run: |
        sleep 3
        echo "pwned" > ${{ github.workspace }}/pwn.txt
        sleep 3

    - name: Stop Falco
      uses: falcosecurity/falco-actions/stop@54d299d4c40de1ad6bf680fefbbfed1bc5b8f057
      with:
        mode: live
        verbose: true
